<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>JLPT Kanji Mastery</title>
    <meta name="description" content="Master JLPT Kanji with stroke animations, level-filtered reading, news, listening, and offline voice practice.">
    <meta name="theme-color" content="#4f46e5">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🉐</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ── Loading overlay ── -->
<div id="loading-overlay">
    <div class="spinner"></div>
    <p id="loading-text">Loading...</p>
</div>

<!-- ── Translate / Lookup Modal (bottom sheet) ── -->
<div id="modal-backdrop"></div>
<div id="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-word-row">
        <div>
            <div id="modal-word">—</div>
            <div id="modal-reading">—</div>
        </div>
        <button class="icon-btn" id="modal-speak-btn" style="background:var(--surface2); color:var(--primary);">🔊</button>
    </div>
    <div id="modal-meaning">—</div>
    <button class="btn-modal-close" id="modal-close-btn">Close</button>
</div>

<!-- ══════════════════════════════════════════
     HEADER
══════════════════════════════════════════ -->
<header class="app-header">
    <div class="header-top">
        <div>
            <div class="app-title">JLPT Kanji Mastery</div>
            <div class="app-subtitle">漢字・語彙・リスニング・ボイス</div>
        </div>
        <button class="icon-btn" id="theme-btn" title="Toggle theme">🌙</button>
    </div>

    <!-- Section tabs -->
    <nav class="tab-nav">
        <button class="tab-btn active" data-tab="kanji">字 Kanji</button>
        <button class="tab-btn" data-tab="reading">📖 Reading</button>
        <button class="tab-btn" data-tab="news">📰 News</button>
        <button class="tab-btn" data-tab="listening">🎧 Listen</button>
        <button class="tab-btn" data-tab="voice">🎙️ Voice</button>
    </nav>

    <!-- JLPT Level pills -->
    <div class="level-nav">
        <button class="level-btn active" data-level="5">N5</button>
        <button class="level-btn" data-level="4">N4</button>
        <button class="level-btn" data-level="3">N3</button>
        <button class="level-btn" data-level="2">N2</button>
        <button class="level-btn" data-level="1">N1</button>
        <button class="level-btn" data-level="favorites">⭐ Favs</button>
    </div>
</header>

<!-- ── Search Bar ── -->
<div class="search-wrap">
    <div class="search-inner">
        <input type="search" id="search-input" placeholder="Search dictionary (JP or EN)…" autocomplete="off" spellcheck="false">
        <button id="search-clear" title="Clear">✕</button>
    </div>
</div>

<!-- ══════════════════════════════════════════
     MAIN CONTENT
══════════════════════════════════════════ -->
<main class="content">

    <!-- ── 1. KANJI ── -->
    <section class="section active" id="sec-kanji">
        <div class="card">
            <div class="kanji-hero">
                <!-- Progress -->
                <div class="progress-chip" id="progress-chip">0 / 0</div>

                <!-- HanziWriter target — DO NOT change the 200×200 dimensions -->
                <div id="hw-target"></div>

                <!-- Meanings -->
                <div class="kanji-meanings" id="kanji-meanings">—</div>

                <!-- Readings -->
                <div class="readings-row">
                    <div class="reading-block">
                        <div class="reading-label">On'yomi</div>
                        <div class="reading-value" id="kanji-on">—</div>
                    </div>
                    <div class="reading-block">
                        <div class="reading-label">Kun'yomi</div>
                        <div class="reading-value" id="kanji-kun">—</div>
                    </div>
                </div>
            </div>

            <!-- Controls -->
            <div class="btn-row">
                <button class="btn" id="btn-hint">💡 Hint</button>
                <button class="btn btn-primary" id="btn-quiz">✍️ Quiz</button>
                <button class="btn btn-icon" id="btn-speak-kanji" title="Listen">🔊</button>
                <button class="btn btn-icon" id="btn-star" title="Add to favourites">☆</button>
            </div>
            <div class="btn-row">
                <button class="btn" id="btn-prev">← Prev</button>
                <button class="btn btn-primary" id="btn-next">Next →</button>
            </div>
        </div>
    </section>

    <!-- ── 2. READING ── -->
    <section class="section" id="sec-reading">
        <div class="card">
            <div class="card-label" id="reading-level-label">N5 Reading</div>
            <div id="reading-content">
                <div class="loading-stub"><div class="spinner"></div><span>Loading story…</span></div>
            </div>
            <div class="btn-row" style="margin-top:16px;">
                <button class="btn btn-primary btn-full" id="btn-next-story">Next Story 🎲</button>
            </div>
        </div>
    </section>

    <!-- ── 3. NEWS ── -->
    <section class="section" id="sec-news">
        <div class="card">
            <div class="card-label" id="news-level-label">N5 News</div>
            <div id="news-content">
                <div class="loading-stub"><div class="spinner"></div><span>Loading news…</span></div>
            </div>
        </div>
    </section>

    <!-- ── 4. LISTENING ── -->
    <section class="section" id="sec-listening">
        <div class="card">
            <div class="card-label" id="listen-level-label">N5 Listening</div>

            <!-- Sentence display -->
            <div class="passage" id="listen-sentence" style="margin-bottom:16px; min-height:56px; text-align:center;">
                ❓ Press ▶ to hear the sentence
            </div>

            <!-- Audio controls -->
            <div class="listen-hero">
                <button class="play-btn" id="btn-play" title="Play">▶</button>
                <div class="audio-ctrl-row">
                    <button class="audio-ctrl" id="btn-pause" title="Pause">⏸</button>
                    <button class="audio-ctrl stop" id="btn-stop" title="Stop">⏹</button>
                </div>
            </div>

            <!-- Multiple choice -->
            <div class="quiz-opts" id="listen-opts"></div>

            <div class="btn-row" style="margin-top:16px;">
                <button class="btn btn-primary btn-full" id="btn-next-listen">Next Sentence 🎲</button>
            </div>
        </div>
    </section>

    <!-- ── 5. VOICE ── -->
    <section class="section" id="sec-voice">
        <div class="card">
            <div class="card-label">Voice Practice</div>
            <div class="voice-hero">
                <div id="voice-word">—</div>
                <div id="voice-meaning">Select a level to begin</div>
                <div style="display:flex; gap:12px; justify-content:center;">
                    <button class="btn btn-icon" id="btn-speak-voice" title="Hear it">🔊</button>
                    <button class="btn btn-primary" id="btn-start-voice" style="flex:0;padding:11px 20px;">🎙️ Speak</button>
                </div>
                <div id="voice-status"></div>
            </div>
            <div class="btn-row">
                <button class="btn btn-full" id="btn-next-voice">Next Word 🎲</button>
            </div>
        </div>
    </section>

    <!-- ── 6. SEARCH RESULTS ── -->
    <section class="section" id="sec-search">
        <div id="search-results"></div>
    </section>

</main>

<!-- HanziWriter CDN -->
<script src="https://cdn.jsdelivr.net/npm/hanzi-writer@3.5/dist/hanzi-writer.min.js"></script>
<!-- App logic -->
<script src="script.js"></script>
</body>
</html>
